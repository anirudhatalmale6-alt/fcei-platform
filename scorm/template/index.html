<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FCEI SCORM Lesson Template</title><style>body{font-family:Arial;margin:0;background:#f6fbf8;color:#111}.wrap{max-width:960px;margin:auto;padding:24px}.card{background:white;border:1px solid #dcece5;border-radius:20px;padding:18px;margin:12px 0}.green{background:#40C788;border:0;border-radius:12px;padding:10px 14px;font-weight:800}</style></head><body><main class="wrap"><h1>FCEI SCORM Lesson Template</h1><p>This template renders generated module SCORM JSON from /scorm/lessons/*.json and maps completion back to the LMS runtime endpoint.</p><div id="lesson"></div><button class="green" onclick="complete()">Simulate SCORM Complete</button></main><script>async function load(){const id=new URLSearchParams(location.search).get('module')||'c01-m01';const data=await fetch('/scorm/lessons/'+id+'-scorm-lesson.json').then(r=>r.json());document.querySelector('#lesson').innerHTML='<h2>'+data.moduleId+' - '+data.title+'</h2>'+data.lessonSections.map(s=>'<section class="card"><h3>'+s.title+'</h3><p>'+s.content+'</p><pre>'+JSON.stringify(s.activity,null,2)+'</pre></section>').join('')}async function complete(){alert('In live SCORM this calls LMSSetValue / Commit. In the FCEI platform this also posts completion to /api/scorm/runtime/:moduleId.')}load()</script></body></html>
